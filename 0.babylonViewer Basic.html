<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="ie=edge" />
  <title>BabylonJS Viewer - Alice Model</title>
  <script src="https://cdn.babylonjs.com/viewer/babylon.viewer.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", "Noto Sans TC", sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f172a, #1e293b, #334155);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 30px;
      color: white;
    }

    .wrapper {
      width: 100%;
      max-width: 1100px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 24px;
      backdrop-filter: blur(12px);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
      overflow: hidden;
    }

    .header {
      text-align: center;
      padding: 32px 24px 20px;
    }

    .header h1 {
      font-size: 2.2rem;
      margin-bottom: 10px;
      color: #93c5fd;
      letter-spacing: 1px;
    }

    .header p {
      color: #cbd5e1;
      font-size: 1rem;
      line-height: 1.6;
    }

    .viewer-section {
      padding: 20px 24px 32px;
    }

    .viewer-box {
      width: 100%;
      height: 70vh;
      min-height: 500px;
      background: rgba(255, 255, 255, 0.06);
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: inset 0 0 20px rgba(255, 255, 255, 0.03);
    }

    babylon {
      width: 100%;
      height: 100%;
      display: block;
    }

    .footer {
      text-align: center;
      padding: 0 24px 28px;
      color: #94a3b8;
      font-size: 0.95rem;
    }

    @media (max-width: 768px) {
      .header h1 {
        font-size: 1.7rem;
      }

      .header p {
        font-size: 0.95rem;
      }

      .viewer-box {
        height: 55vh;
        min-height: 380px;
      }
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="header">
      <h1>BabylonJS 3D Viewer</h1>
      <p>
        Alice 3D 模型展示頁面<br>
        可用滑鼠旋轉、縮放與檢視模型細節
      </p>
    </div>

    <div class="viewer-section">
      <div class="viewer-box">
        <babylon model="./models/alice.glb"></babylon>
      </div>
    </div>

    <div class="footer">
      © 2026 3D Model Showcase
    </div>
  </div>
</body>
</html>
